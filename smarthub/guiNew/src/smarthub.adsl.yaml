
types:
  SensorRecord:
    fields:
      value: byte
      time: byte
  DeviceStream:
    stream:
      api: SmartHomeDeviceApi
  GuiStream:
    stream:
      api: SmartHomeGuiApi

api:
  SmartHomeHubRegistryApi:
    methods:
      device:
        id: 3
        params:
          stream: DeviceStream
      gui:
        id: 4
        params:
          stream: GuiStream

  SmartHomeDeviceApi:
    methods:
      reportState:
        id: 10
        params:
          deviceUid: uuid
          value: SensorRecord[]

  SmartHomeGuiApi:
    methods:
      getDevices:
        id: 12
        returns: uuid[]
      subscribeToDevice:
        id: 13
        params:
          deviceUid: uuid
        returns: bool
      unsubscribeFromDevice:
        id: 14
        params:
          deviceUid: uuid
        returns: bool
      requestDeviceHistory:
        id: 15
        params:
          deviceUid: uuid
          count: intpack
        returns: SensorRecord[]


  SmartHomeClientGuiApi:
    methods:
      deviceStateUpdated:
        id: 20
        params:
          deviceUid: uuid
          records: SensorRecord[]

  SmartHomeClientDeviceApi:
    # Пустой интерфейс для устройства
