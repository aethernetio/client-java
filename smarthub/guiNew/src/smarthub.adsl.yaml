
types:
  SensorRecord:
    fields:
      value: byte
      time: byte
  DeviceStream:
    stream:
      api: SmartHomeDeviceApi
  GuiStream:
    stream:
      api: SmartHomeGuiApi

api:
  SmartHomeHubRegistryApi:
    methods:
      device:
        id: 3
        params:
          stream: DeviceStream
      gui:
        id: 4
        params:
          stream: GuiStream

  SmartHomeDeviceApi:
    methods:
      reportState:
        id: 10
        params:
          deviceUid: uuid
          value: SensorRecord[]


  SmartHomeGuiApi:
    methods:
      getDevices:
        id: 12
      requestDeviceHistory:
        id: 15
        params:
          deviceUid: uuid
          count: intpack




  SmartHomeClientGuiApi:
    methods:
      deviceStateUpdated:
        id: 20
        params:
          deviceUid: uuid
          records: SensorRecord[]
      onGetDevicesResult:
        id: 21
        params:
          devices: uuid[]
      onRequestHistoryResult:
        id: 24
        params:
          deviceUid: uuid
          records: SensorRecord[]

    # Пустой интерфейс для устройства