<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHub Monitor</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #000; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            text-align: center; 
            background: #111; 
            padding: 30px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 600px; 
            border: 1px solid #222; 
        }
        #screen-connect, #screen-display { 
            display: none; 
        }
        .visible { 
            display: block !important; 
        }
        input, select { 
            font-size: 1rem; 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            border-radius: 12px; 
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 24px; 
            font-size: 1rem; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            margin-bottom: 10px;
        }
        button.secondary {
            background: #333;
            color: #fff;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 12px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-dot.gray { background: #444; }
        .status-dot.green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .status-dot.red { background: #ff3b30; }
        .status-dot.blue { background: #007aff; box-shadow: 0 0 10px #007aff; }
        
        .device-list {
            margin-top: 20px;
            text-align: left;
        }
        .device-item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .device-item:hover {
            background: #222;
        }
        .device-item.selected {
            border: 2px solid #007aff;
        }
        .device-id {
            font-family: monospace;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
        }
        .device-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .temp-value {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .time-value {
            color: #666;
            font-size: 0.8rem;
        }
        
        .chart-container {
            margin-top: 20px;
            height: 200px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }
        .stat-label {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .logs {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            text-align: left;
            font-size: 0.8rem;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #333;
            color: #888;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Экран подключения -->
    <div id="screen-connect">
        <h2 style="margin-top:0">Connect to SmartHub</h2>
        <button id="btn-connect">Connect</button>
        <button id="btn-restore" class="secondary">Restore Session</button>
    </div>

    <!-- Экран отображения данных -->
    <div id="screen-display">
        <div class="status-bar">
            <div class="status-indicator">
                <span id="status-dot" class="status-dot gray"></span>
                <span id="status-text">Disconnected</span>
            </div>
            <div>
                <span id="devices-count">0</span> devices
            </div>
        </div>

        <div class="device-list" id="device-list">
            <!-- Список устройств будет добавлен динамически -->
        </div>

        <div id="device-details" style="display: none;">
            <h3 id="selected-device-id"></h3>

            <div class="chart-container" id="chart-container">
                <canvas id="temp-chart"></canvas>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Current Temp</div>
                    <div class="stat-value" id="current-temp">--°C</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Last Update</div>
                    <div class="stat-value" id="last-update">--:--</div>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-refresh" class="secondary" style="flex: 1">Refresh</button>
            </div>
        </div>

        <div class="logs" id="event-log"></div>

        <button id="btn-disconnect" class="secondary" style="margin-top: 10px;">Disconnect</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="simple_hub.js"></script>
</body>
</html>
