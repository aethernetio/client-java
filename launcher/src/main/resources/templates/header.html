<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{title}}</title>
<style>
  body { font-family: Arial, sans-serif; margin: 2em; background: #f9f9f9; }
  .container { max-width: 900px; margin: auto; background: white; padding: 2em; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  button, select { margin: 5px; padding: 8px 16px; font-size: 14px; }
  .status { margin: 10px 0; font-weight: bold; }
  .uuid { color: #2a5db0; font-family: monospace; }
  #commands { margin-top: 20px; }
  .cmd-block { border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px; }
  .cmd-header { background: #f5f5f5; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .cmd-header .led { width: 12px; height: 12px; border-radius: 50%; background: gray; flex-shrink: 0; }
.cmd-header .led.running { background: green; }
  .cmd-header .led.success { background: green; }
  .cmd-header .led.error { background: red; }
  .cmd-title { flex: 1; font-weight: bold; }
  .cmd-body { padding: 8px 12px; background: #fafafa; }
  .cmd-tabs { margin-bottom: 6px; }
  .cmd-tabs button { border: 1px solid #ccc; background: #eee; cursor: pointer; font-size: 12px; }
  .cmd-tabs button.active { background: #0070f3; color: #fff; border-color: #0070f3; }
  .cmd-code { background: #1e1e1e; color: #d4d4d4; padding: 8px; font-family: monospace; font-size: 13px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
  .cmd-log { background: #1e1e1e; color: #d4d4d4; padding: 8px; font-family: monospace; font-size: 13px; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-top: 6px; }
  .collapsed { display: none; }
  .tab { display: inline-block; padding: 8px 16px; margin-right: 4px; border-radius: 6px 6px 0 0; cursor: pointer; background: #e0e0e0; font-weight: bold; }
  .tab.active { background: #0070f3; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <div style="margin-bottom: 10px;"><label>Workspace:</label><input type="text" id="workspaceInput" value="{{workspace}}" size="40" onchange="api('set-workspace', this.value)"></div>
  <h1>{{title}}</h1>
