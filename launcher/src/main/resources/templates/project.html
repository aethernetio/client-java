<div id="tab-project" style="display:none;">
    <div id="controls">
        <select id="projectSelect">
            {{projectOptions}}
        </select>
        <button id="cloneBtn" onclick="toggleClone()">Clone</button>
        <button disabled id="buildBtn" onclick="api('build')">Build</button>
        <button disabled id="runBtn" onclick="api('run')">Run</button>


        <button disabled id="stopBtn" onclick="api('stop')">Stop</button>
        {{emulatorButtons}}
        <button disabled id="stopEmulatorBtn" onclick="api('stop-emulator')">Stop Emulator</button>
        <button disabled id="openProjectBtn" onclick="openProjectFolder()">📂 Open Project</button>
    </div>
    <div class="status" id="status"></div>
    <div class="uuid" id="uuidDisplay"></div>
    <div id="sourceLinks" style="margin-top: 10px; display: none;">
        <strong>Source code (local paths):</strong>
        <ul style="list-style: none; padding: 0; margin: 5px 0;">
            {{sourceLinks}}
        </ul>
    </div>
    <div id="commands"></div>
</div>
